<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .container { display: none; }
        .active { display: block; }
        label { display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
        #msg, #loginMsg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Login Form -->
    <div id="loginPage" class="container active">
        <h2>Employee Login</h2>
        <form id="loginForm">
            <label>Employee ID</label>
            <input type="number" id="loginEmpId" required>

            <label>Password</label>
            <input type="password" id="loginPassword" required>

            <button type="submit">Login</button>
        </form>
        <div id="loginMsg"></div>
    </div>

    <!-- Transaction Form -->
    <div id="txnPage" class="container">
        <h2>Add Transaction</h2>
        <p><strong>Logged in as: Employee <span id="displayEmpId"></span></strong></p>
        
        <form id="txnForm">
            <label>Items</label>
            <input type="text" id="items" required>

            <label>Amount</label>
            <input type="number" id="amount" required>

            <label>Category</label>
            <select id="category">
                <option value="1">Fuel</option>
                <option value="2">Infrastructure</option>
                <option value="3">Staff Welfare</option>
                <option value="4">Office Supplies</option>
                <option value="5">Equipment</option>
                <option value="6">Transport</option>
                <option value="7">Medical</option>
                <option value="8">Training</option>
            </select>

            <input type="hidden" id="empid"> <!-- Hidden field filled after login -->

            <button type="submit">Add Transaction</button>
        </form>
        <div id="msg"></div>
        <button onclick="logout()">Logout</button>
    </div>

<script>
// ==================== LOGIN ====================
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const empid = document.getElementById("loginEmpId").value;
    const password = document.getElementById("loginPassword").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ empid, password })
    });

    const result = await response.json();
    const msg = document.getElementById("loginMsg");

    if (result.success) {
        // Store empid and switch to transaction page
        document.getElementById("empid").value = empid;
        document.getElementById("displayEmpId").textContent = empid;
        
        document.getElementById("loginPage").classList.remove("active");
        document.getElementById("txnPage").classList.add("active");
    } else {
        msg.innerHTML = "❌ " + result.message;
    }
});

// ==================== ADD TRANSACTION ====================
document.getElementById("txnForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
        items: document.getElementById("items").value,
        amount: document.getElementById("amount").value,
        empid: document.getElementById("empid").value,
        category: document.getElementById("category").value
    };

    const response = await fetch("/addTransaction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await response.json();
    const msg = document.getElementById("msg");

    if (result.success) {
        msg.innerHTML = "✅ " + result.message;
        document.getElementById("txnForm").reset();
    } else {
        msg.innerHTML = "❌ " + result.message;
    }
});

function logout() {
    document.getElementById("txnPage").classList.remove("active");
    document.getElementById("loginPage").classList.add("active");
    document.getElementById("loginForm").reset();
    document.getElementById("loginMsg").innerHTML = "";
}
</script>
</body>
</html>

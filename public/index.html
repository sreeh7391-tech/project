<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Transaction</title>

<style>

body{
    font-family: Arial;
    max-width:600px;
    margin:40px auto;
}

label{
    display:block;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
}

button{
    margin-top:20px;
    padding:10px 20px;
}

#msg{
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>
<body>

<h2>Add Transaction</h2>

<form id="txnForm">

<label>Items</label>
<input type="text" id="items" required>

<label>Amount</label>
<input type="number" id="amount" required>

<label>Employee ID</label>
<input type="number" id="empid" required>

<label>Category</label>

<select id="category">
    <option value="1">Fuel</option>
    <option value="2">Infrastructure</option>
    <option value="3">Staff Welfare</option>
    <option value="4">Office Supplies</option>
    <option value="5">Equipment</option>
    <option value="6">Transport</option>
    <option value="7">Medical</option>
    <option value="8">Training</option>
</select>

<button type="submit">
Add Transaction
</button>

</form>

<div id="msg"></div>

<script>

document.getElementById("txnForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const payload = {

        items:
            document.getElementById("items").value,

        amount:
            document.getElementById("amount").value,

        empid:
            document.getElementById("empid").value,

        category:
            document.getElementById("category").value
    };

    const response = await fetch(
        "/addTransaction",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        }
    );

    const result = await response.json();

    const msg = document.getElementById("msg");

    if(result.success){
        msg.innerHTML = "✅ " + result.message;
        document.getElementById("txnForm").reset();
    }
    else{
        msg.innerHTML = "❌ " + result.message;
    }

});

</script>

</body>
</html>

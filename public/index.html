<!DOCTYPE html>
<html>
<head>
<title>Transaction App</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:30px}
.box{max-width:400px;margin:auto;background:white;padding:20px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin-top:10px}
button{background:#007bff;color:white;border:none;cursor:pointer}
.hidden{display:none}
</style>

</head>
<body>

<div class="box">

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="empid" placeholder="Employee ID">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- FORM -->
<div id="formBox" class="hidden">
<h2>Transaction</h2>

<input id="items" placeholder="Items">
<input id="amount" type="number" placeholder="Amount">

<select id="cat">
<option value="1">Fuel</option>
<option value="2">Infra</option>
<option value="3">Staff</option>
<option value="4">Office</option>
<option value="5">Equip</option>
<option value="6">Transport</option>
<option value="7">Medical</option>
<option value="8">Training</option>
</select>

<button onclick="submitTxn()">Submit</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>
</div>

</div>

<script>

let currentEmp = null;

/* LOGIN */
async function login(){

const empid = document.getElementById("empid").value;
const password = document.getElementById("password").value;

const res = await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({empid,password})
});

const data = await res.json();

if(data.success){
    currentEmp = empid;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("formBox").classList.remove("hidden");
}else{
    document.getElementById("msg").innerText="Invalid Login";
}

}

/* TRANSACTION */
async function submitTxn(){

const items = document.getElementById("items").value;
const amount = document.getElementById("amount").value;
const cat = document.getElementById("cat").value;

const cat_id = 400 + parseInt(cat);

const res = await fetch("/addTransaction",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
items,
amount,
empid:currentEmp,
cat_id
})
});

const data = await res.json();

if(data.success){
    document.getElementById("msg").innerText="Success";
}else{
    document.getElementById("msg").innerText="No Balance";
}

}

/* LOGOUT */
function logout(){
location.reload();
}

</script>

</body>
</html>
